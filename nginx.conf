server {
    listen __PORT__;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively
    location ~* \.(ico|css|js|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Route all paths to index.html (SPA-style)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Explicit routes
    location /admin        { try_files $uri /index.html; }
    location /rent         { try_files $uri /index.html; }
    location /buy          { try_files $uri /index.html; }
    location /lease        { try_files $uri /index.html; }
    location /owner        { try_files $uri /owner-dashboard.html; }
    location /sales        { try_files $uri /sales.html; }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
